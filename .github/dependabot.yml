version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: nix
    directory: /dev
    schedule:
      interval: quarterly
    cooldown:
      default-days: 7
    groups:
      nix-dev:
        patterns: ["*"]
